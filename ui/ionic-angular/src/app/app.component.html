<ion-app>
  <ion-header>
    <ion-toolbar color="primary">
      <ion-title>
        <img src="assets/microsoft-logo.svg" alt="Microsoft" class="ms-logo" />
        Fabric IQ Employee Knowledge Demo
      </ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-split-pane contentId="main-content" when="(min-width: 768px)">
    <ion-menu contentId="main-content" type="overlay">
      <ion-content>
        <ion-list>
          <ion-menu-toggle auto-hide="false" *ngFor="let page of pages">
            <ion-item [routerLink]="page.url">{{ page.title }}</ion-item>
          </ion-menu-toggle>
        </ion-list>
      </ion-content>
    </ion-menu>

    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>

  <ion-footer>
    <ion-toolbar>
      <ion-title size="small">
        Michael Yaacoub | Experienced Full Stack & AI Software Engineer / Architect at Microsoft |
        <a href="https://www.linkedin.com/in/michael-yaacoub-7a46436" target="_blank">LinkedIn</a> |
        <a href="https://github.com/csdmichael" target="_blank">GitHub</a>
      </ion-title>
    </ion-toolbar>
  </ion-footer>
</ion-app>
