name: Upload Employee Assets to Azure Blob Storage

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run – list files without uploading"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/upload-employee-assets.yml"
      - "config/workflows.json"
      - "config/fabric-settings.json"
      - "data/employees/**"
      - "data/projects.json"
      - "data/storage_map.json"

permissions:
  contents: read
  id-token: write

jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      python_version: ${{ steps.read.outputs.python_version }}
      local_assets_path: ${{ steps.read.outputs.local_assets_path }}
      storage_container: ${{ steps.read.outputs.storage_container }}
      ingestion_path_template: ${{ steps.read.outputs.ingestion_path_template }}
    steps:
      - uses: actions/checkout@v4

      - id: read
        name: Read upload configuration from config files
        run: |
          set -euo pipefail

          # Read runtime settings from config/workflows.json (no hardcoding in YAML)
          python_version=$(jq -r '.upload.pythonVersion' config/workflows.json)
          local_assets_path=$(jq -r '.upload.localAssetsPath' config/workflows.json)
          fabric_settings_file=$(jq -r '.upload.fabricSettingsFile' config/workflows.json)
          storage_map_file=$(jq -r '.upload.storageMapFile' config/workflows.json)

          # Read container name from fabric-settings.json (path referenced by workflow config)
          storage_container=$(jq -r '.storage.inputContainer' "$fabric_settings_file")

          # Read ingestion path template from storage_map.json
          ingestion_path_template=$(jq -r '.onedriveIngestionPathTemplate' "$storage_map_file")

          echo "python_version=$python_version" >> "$GITHUB_OUTPUT"
          echo "local_assets_path=$local_assets_path" >> "$GITHUB_OUTPUT"
          echo "storage_container=$storage_container" >> "$GITHUB_OUTPUT"
          echo "ingestion_path_template=$ingestion_path_template" >> "$GITHUB_OUTPUT"

          echo "=== Resolved upload configuration ==="
          echo "  local_assets_path   : $local_assets_path"
          echo "  storage_container   : $storage_container"
          echo "  ingestion_path_tmpl : $ingestion_path_template"

  # Detect which Azure auth method is available without exposing secret values.
  # Outputs auth_mode: "oidc" | "sp" | "none"
  check-auth:
    runs-on: ubuntu-latest
    outputs:
      auth_mode: ${{ steps.detect.outputs.auth_mode }}
    steps:
      - id: detect
        name: Detect Azure credential availability
        env:
          _CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          _TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          _SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          _CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [[ -n "${_CLIENT_ID}" && -n "${_TENANT_ID}" && -n "${_SUBSCRIPTION_ID}" ]]; then
            echo "auth_mode=oidc" >> "$GITHUB_OUTPUT"
            echo "Azure OIDC credentials detected (AZURE_CLIENT_ID + AZURE_TENANT_ID + AZURE_SUBSCRIPTION_ID)."
          elif [[ -n "${_CREDENTIALS}" ]]; then
            echo "auth_mode=sp" >> "$GITHUB_OUTPUT"
            echo "Azure service principal credentials detected (AZURE_CREDENTIALS)."
          else
            echo "auth_mode=none" >> "$GITHUB_OUTPUT"
            echo "::warning::No Azure credentials found. Asset upload steps will be skipped."
            echo "Set AZURE_CLIENT_ID + AZURE_TENANT_ID + AZURE_SUBSCRIPTION_ID (OIDC) or AZURE_CREDENTIALS (service principal JSON) in repository secrets."
            echo "Also set AZURE_STORAGE_ACCOUNT to the target storage account name."
            echo "See the 'GitHub Secrets Setup' section of README.md for detailed instructions."
          fi

  upload-assets:
    needs:
      - load-config
      - check-auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.load-config.outputs.python_version }}

      # Secret names are documented in config/workflows.json under upload.azureCredentialsSecretName
      # and upload.storageAccountSecretName. They are referenced statically here (required by GitHub
      # Actions security model – dynamic secret lookup exposes all secrets to the runner).
      - name: Azure Login (OIDC)
        if: needs.check-auth.outputs.auth_mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Login (service principal JSON)
        if: needs.check-auth.outputs.auth_mode == 'sp'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload employee assets to Azure Blob Storage
        if: needs.check-auth.outputs.auth_mode != 'none'
        env:
          LOCAL_ASSETS_PATH: ${{ needs.load-config.outputs.local_assets_path }}
          STORAGE_CONTAINER: ${{ needs.load-config.outputs.storage_container }}
          INGESTION_PATH_TEMPLATE: ${{ needs.load-config.outputs.ingestion_path_template }}
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, pathlib, subprocess, sys

          local_root    = pathlib.Path(os.environ["LOCAL_ASSETS_PATH"])
          container     = os.environ["STORAGE_CONTAINER"]
          path_tmpl     = os.environ["INGESTION_PATH_TEMPLATE"]   # e.g. "{employeeId}/"
          account       = os.environ["STORAGE_ACCOUNT"]
          dry_run       = os.environ.get("DRY_RUN", "false").lower() == "true"

          if not local_root.exists():
              raise SystemExit(f"Assets directory not found: {local_root}")

          uploaded = 0
          errors   = 0

          # Walk each employee sub-folder (EMP001, EMP002, …)
          for emp_dir in sorted(local_root.iterdir()):
              if not emp_dir.is_dir():
                  continue

              emp_id      = emp_dir.name
              blob_prefix = path_tmpl.replace("{employeeId}", emp_id)

              for asset_file in sorted(emp_dir.iterdir()):
                  if not asset_file.is_file():
                      continue

                  blob_name = f"{blob_prefix}{asset_file.name}"

                  if dry_run:
                      print(f"[DRY-RUN] Would upload: {asset_file.name} -> {container}/{blob_name}")
                      uploaded += 1
                      continue

                  cmd = [
                      "az", "storage", "blob", "upload",
                      "--account-name", account,
                      "--container-name", container,
                      "--name",          blob_name,
                      "--file",          str(asset_file),
                      "--overwrite",
                      "--auth-mode",     "login",
                      "--output",        "none",
                  ]

                  result = subprocess.run(cmd, capture_output=True, text=True)
                  if result.returncode != 0:
                      print(f"ERROR uploading {blob_name}: {result.stderr.strip()}", file=sys.stderr)
                      errors += 1
                  else:
                      print(f"OK: {blob_name}")
                      uploaded += 1

          print(f"\nSummary - uploaded: {uploaded}, errors: {errors}")
          if errors:
              raise SystemExit(f"{errors} file(s) failed to upload.")
          PY

      - name: Upload projects.json to Azure Blob Storage
        if: >-
          needs.check-auth.outputs.auth_mode != 'none' &&
          github.event.inputs.dry_run != 'true'
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          STORAGE_CONTAINER: ${{ needs.load-config.outputs.storage_container }}
        run: |
          set -euo pipefail
          az storage blob upload \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$STORAGE_CONTAINER" \
            --name "projects.json" \
            --file "data/projects.json" \
            --overwrite \
            --auth-mode login \
            --output none
          echo "Uploaded data/projects.json -> ${STORAGE_CONTAINER}/projects.json"

      - name: Upload summary
        if: always()
        env:
          AUTH_MODE: ${{ needs.check-auth.outputs.auth_mode }}
        run: |
          echo "### Employee Asset Upload" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Container | ${{ needs.load-config.outputs.storage_container }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Local path | ${{ needs.load-config.outputs.local_assets_path }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | ${{ github.event.inputs.dry_run || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$AUTH_MODE" == "none" ]]; then
            echo "| Azure auth | ⚠️ Not configured — upload skipped |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Set \`AZURE_CLIENT_ID\`, \`AZURE_TENANT_ID\`, \`AZURE_SUBSCRIPTION_ID\`, and \`AZURE_STORAGE_ACCOUNT\` (or \`AZURE_CREDENTIALS\`) in repository secrets to enable uploads." >> "$GITHUB_STEP_SUMMARY"
            echo "See the **GitHub Secrets Setup** section in [README.md](README.md)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Azure auth | ✅ \`$AUTH_MODE\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
