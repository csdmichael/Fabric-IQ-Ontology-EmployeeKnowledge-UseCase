name: Deploy Infrastructure and Artifacts

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply after successful plan"
        required: true
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      terraform_version: ${{ steps.read.outputs.terraform_version }}
      tf_dir: ${{ steps.read.outputs.tf_dir }}
      tf_var_file: ${{ steps.read.outputs.tf_var_file }}
      artifact_name: ${{ steps.read.outputs.artifact_name }}
      artifact_paths: ${{ steps.read.outputs.artifact_paths }}
      azure_subscription_id: ${{ steps.read.outputs.azure_subscription_id }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          set -euo pipefail
          terraform_version=$(jq -r '.ci.terraformVersion' config/workflows.json)
          tf_dir=$(jq -r '.deploy.terraformWorkingDirectory' config/workflows.json)
          tf_var_file=$(jq -r '.deploy.terraformVarFile' config/workflows.json)
          artifact_name=$(jq -r '.deploy.artifactName' config/workflows.json)
          artifact_paths=$(jq -c '.deploy.artifactPaths' config/workflows.json)
          azure_subscription_id=$(jq -r '.subscriptionId' config/azure-hosting-resources.json)

          echo "terraform_version=$terraform_version" >> "$GITHUB_OUTPUT"
          echo "tf_dir=$tf_dir" >> "$GITHUB_OUTPUT"
          echo "tf_var_file=$tf_var_file" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "artifact_paths=$artifact_paths" >> "$GITHUB_OUTPUT"
          echo "azure_subscription_id=$azure_subscription_id" >> "$GITHUB_OUTPUT"

  package-fabric-bundle:
    needs: load-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build deployment bundle
        env:
          ARTIFACT_PATHS: ${{ needs.load-config.outputs.artifact_paths }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, pathlib, zipfile
          paths = json.loads(os.environ['ARTIFACT_PATHS'])
          out = pathlib.Path('fabric-deployment-bundle.zip')
          with zipfile.ZipFile(out, 'w', zipfile.ZIP_DEFLATED) as z:
              for p in paths:
                  path = pathlib.Path(p)
                  if path.is_file():
                      z.write(path, path)
                  else:
                      for item in path.rglob('*'):
                          if item.is_file():
                              z.write(item, item)
          print(f'Created {out}')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.load-config.outputs.artifact_name }}
          path: fabric-deployment-bundle.zip

  terraform-plan:
    needs: load-config
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ needs.load-config.outputs.tf_dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.load-config.outputs.terraform_version }}
      - name: Azure Login
        if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_SUBSCRIPTION_ID || needs.load-config.outputs.azure_subscription_id }}
      - name: Azure Login (service principal JSON credentials fallback)
        if: ${{ !(secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '') && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Validate Azure authentication inputs
        if: ${{ !(secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '') && secrets.AZURE_CREDENTIALS == '' }}
        run: |
          echo "Missing Azure auth configuration." >&2
          echo "Set either AZURE_CLIENT_ID/AZURE_TENANT_ID[/AZURE_SUBSCRIPTION_ID] or AZURE_CREDENTIALS JSON secret." >&2
          exit 1
      - name: Terraform init and plan
        env:
          TF_VAR_FILE: ${{ needs.load-config.outputs.tf_var_file }}
        run: |
          set -euo pipefail
          terraform init
          terraform plan -var-file="$TF_VAR_FILE" -out=tfplan
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ needs.load-config.outputs.tf_dir }}/tfplan

  terraform-apply:
    if: ${{ github.event.inputs.apply == 'true' }}
    needs:
      - terraform-plan
      - package-fabric-bundle
      - load-config
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ needs.load-config.outputs.tf_dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.load-config.outputs.terraform_version }}
      - name: Azure Login
        if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_SUBSCRIPTION_ID || needs.load-config.outputs.azure_subscription_id }}
      - name: Azure Login (service principal JSON credentials fallback)
        if: ${{ !(secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '') && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Validate Azure authentication inputs
        if: ${{ !(secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '') && secrets.AZURE_CREDENTIALS == '' }}
        run: |
          echo "Missing Azure auth configuration." >&2
          echo "Set either AZURE_CLIENT_ID/AZURE_TENANT_ID[/AZURE_SUBSCRIPTION_ID] or AZURE_CREDENTIALS JSON secret." >&2
          exit 1
      - uses: actions/download-artifact@v4.1.3
        with:
          name: terraform-plan
          path: ${{ needs.load-config.outputs.tf_dir }}
      - name: Terraform apply
        run: |
          set -euo pipefail
          terraform init
          terraform apply -auto-approve tfplan

  deploy-ui:
    if: ${{ github.event.inputs.apply == 'true' }}
    needs:
      - terraform-apply
      - load-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_SUBSCRIPTION_ID || needs.load-config.outputs.azure_subscription_id }}
      - name: Azure Login (service principal JSON credentials fallback)
        if: ${{ !(secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '') && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Validate Azure authentication inputs
        if: ${{ !(secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '') && secrets.AZURE_CREDENTIALS == '' }}
        run: |
          echo "Missing Azure auth configuration." >&2
          echo "Set either AZURE_CLIENT_ID/AZURE_TENANT_ID[/AZURE_SUBSCRIPTION_ID] or AZURE_CREDENTIALS JSON secret." >&2
          exit 1
      - name: Upload projects.json to Azure Blob Storage
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
        run: |
          set -euo pipefail
          az storage blob upload \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "employee-knowledge-raw" \
            --name "projects.json" \
            --file "data/projects.json" \
            --overwrite \
            --auth-mode login \
            --output none
          echo "Uploaded data/projects.json -> employee-knowledge-raw/projects.json"
      - name: Package UI for deployment
        run: |
          set -euo pipefail
          UI_DIR="ui/ionic-angular"
          # This UI is a demo scaffold. In a production pipeline replace the steps below with:
          #   npm ci --prefix "$UI_DIR"
          #   npm run build --prefix "$UI_DIR"   # ionic build → dist/
          # and zip the dist/ output instead.
          # For the demo we package the static source assets (config, data, src) directly so
          # the app service can serve them via a static-file host or custom server.
          mkdir -p "$UI_DIR/dist-deploy/config" "$UI_DIR/dist-deploy/data"
          cp config/endpoints.json "$UI_DIR/dist-deploy/config/endpoints.json"
          cp data/employees.json data/digital_assets.json data/projects.json "$UI_DIR/dist-deploy/data/"
          # Copy UI source files into deployment root
          cp -r "$UI_DIR/src/." "$UI_DIR/dist-deploy/"
          cd "$UI_DIR/dist-deploy"
          zip -r ../ui-deployment.zip .
      - name: Deploy UI to App Service
        env:
          UI_APP_NAME: fabric-iq-emp-knowledge-ui
          RESOURCE_GROUP: ai-myaacoub
        run: |
          set -euo pipefail
          az webapp deploy \
            --resource-group "$RESOURCE_GROUP" \
            --name "$UI_APP_NAME" \
            --src-path "ui/ionic-angular/ui-deployment.zip" \
            --type zip \
            --async false
          echo "UI deployed to https://${UI_APP_NAME}.azurewebsites.net"
