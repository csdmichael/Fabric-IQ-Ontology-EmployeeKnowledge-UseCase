name: Deploy Infrastructure and Artifacts

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply after successful plan"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "api/**"
      - "config/**"
      - "data/**"
      - "docs/**"
      - "fabric/**"
      - "terraform/**"
      - "ui/**"

permissions:
  contents: read
  id-token: write

jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      terraform_version: ${{ steps.read.outputs.terraform_version }}
      tf_dir: ${{ steps.read.outputs.tf_dir }}
      tf_var_file: ${{ steps.read.outputs.tf_var_file }}
      artifact_name: ${{ steps.read.outputs.artifact_name }}
      artifact_paths: ${{ steps.read.outputs.artifact_paths }}
      azure_subscription_id: ${{ steps.read.outputs.azure_subscription_id }}
      azure_resource_group: ${{ steps.read.outputs.azure_resource_group }}
      ui_app_name: ${{ steps.read.outputs.ui_app_name }}
      api_app_name: ${{ steps.read.outputs.api_app_name }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          set -euo pipefail
          terraform_version=$(jq -r '.ci.terraformVersion' config/workflows.json)
          tf_dir=$(jq -r '.deploy.terraformWorkingDirectory' config/workflows.json)
          tf_var_file=$(jq -r '.deploy.terraformVarFile' config/workflows.json)
          artifact_name=$(jq -r '.deploy.artifactName' config/workflows.json)
          artifact_paths=$(jq -c '.deploy.artifactPaths' config/workflows.json)
          azure_subscription_id=$(jq -r '.subscriptionId' config/azure-hosting-resources.json)
          azure_resource_group=$(jq -r '.resourceGroup' config/azure-hosting-resources.json)
          ui_app_name=$(jq -r '.hosting.uiWebApp.name' config/azure-hosting-resources.json)
          api_app_name=$(jq -r '.hosting.apiWebApp.name' config/azure-hosting-resources.json)

          echo "terraform_version=$terraform_version" >> "$GITHUB_OUTPUT"
          echo "tf_dir=$tf_dir" >> "$GITHUB_OUTPUT"
          echo "tf_var_file=$tf_var_file" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "artifact_paths=$artifact_paths" >> "$GITHUB_OUTPUT"
          echo "azure_subscription_id=$azure_subscription_id" >> "$GITHUB_OUTPUT"
          echo "azure_resource_group=$azure_resource_group" >> "$GITHUB_OUTPUT"
          echo "ui_app_name=$ui_app_name" >> "$GITHUB_OUTPUT"
          echo "api_app_name=$api_app_name" >> "$GITHUB_OUTPUT"

  # Detect which Azure auth method is available without exposing secret values.
  # Outputs auth_mode: "oidc" | "sp" | "none"
  check-auth:
    runs-on: ubuntu-latest
    outputs:
      auth_mode: ${{ steps.detect.outputs.auth_mode }}
    steps:
      - id: detect
        name: Detect Azure credential availability
        env:
          _CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          _TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          _CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [[ -n "${_CLIENT_ID}" && -n "${_TENANT_ID}" ]]; then
            echo "auth_mode=oidc" >> "$GITHUB_OUTPUT"
            echo "Azure OIDC credentials detected (AZURE_CLIENT_ID + AZURE_TENANT_ID)."
          elif [[ -n "${_CREDENTIALS}" ]]; then
            echo "auth_mode=sp" >> "$GITHUB_OUTPUT"
            echo "Azure service principal credentials detected (AZURE_CREDENTIALS)."
          else
            echo "auth_mode=none" >> "$GITHUB_OUTPUT"
            echo "::warning::No Azure credentials found. Terraform plan/apply and UI deployment steps will be skipped."
            echo "Set AZURE_CLIENT_ID + AZURE_TENANT_ID (OIDC) or AZURE_CREDENTIALS (service principal JSON) in repository secrets."
            echo "See the 'GitHub Secrets Setup' section of README.md for detailed instructions."
          fi

  package-fabric-bundle:
    needs: load-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build deployment bundle
        env:
          ARTIFACT_PATHS: ${{ needs.load-config.outputs.artifact_paths }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, pathlib, zipfile
          paths = json.loads(os.environ['ARTIFACT_PATHS'])
          out = pathlib.Path('fabric-deployment-bundle.zip')
          with zipfile.ZipFile(out, 'w', zipfile.ZIP_DEFLATED) as z:
              for p in paths:
                  path = pathlib.Path(p)
                  if path.is_file():
                      z.write(path, path)
                  else:
                      for item in path.rglob('*'):
                          if item.is_file():
                              z.write(item, item)
          print(f'Created {out}')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.load-config.outputs.artifact_name }}
          path: fabric-deployment-bundle.zip

  terraform-plan:
    needs:
      - load-config
      - check-auth
    # Skip when no Azure credentials are configured
    if: needs.check-auth.outputs.auth_mode != 'none'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ needs.load-config.outputs.tf_dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.load-config.outputs.terraform_version }}
      - name: Azure Login (OIDC)
        if: needs.check-auth.outputs.auth_mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || needs.load-config.outputs.azure_subscription_id }}
      - name: Azure Login (service principal JSON)
        if: needs.check-auth.outputs.auth_mode == 'sp'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Terraform init and plan
        env:
          TF_VAR_FILE: ${{ needs.load-config.outputs.tf_var_file }}
        run: |
          set -euo pipefail
          terraform init
          terraform plan -var-file="$TF_VAR_FILE" -out=tfplan
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ needs.load-config.outputs.tf_dir }}/tfplan

  terraform-apply:
    if: >-
      github.event.inputs.apply == 'true' &&
      needs.check-auth.outputs.auth_mode != 'none'
    needs:
      - terraform-plan
      - package-fabric-bundle
      - load-config
      - check-auth
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ needs.load-config.outputs.tf_dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.load-config.outputs.terraform_version }}
      - name: Azure Login (OIDC)
        if: needs.check-auth.outputs.auth_mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || needs.load-config.outputs.azure_subscription_id }}
      - name: Azure Login (service principal JSON)
        if: needs.check-auth.outputs.auth_mode == 'sp'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: actions/download-artifact@v4.1.3
        with:
          name: terraform-plan
          path: ${{ needs.load-config.outputs.tf_dir }}
      - name: Terraform apply
        run: |
          set -euo pipefail
          terraform init
          terraform apply -auto-approve tfplan

  deploy-api:
    if: >-
      github.event.inputs.apply == 'true' &&
      needs.check-auth.outputs.auth_mode != 'none'
    needs:
      - terraform-apply
      - load-config
      - check-auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        if: needs.check-auth.outputs.auth_mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || needs.load-config.outputs.azure_subscription_id }}
      - name: Azure Login (service principal JSON)
        if: needs.check-auth.outputs.auth_mode == 'sp'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Package and deploy API
        env:
          API_APP_NAME: ${{ needs.load-config.outputs.api_app_name }}
          RESOURCE_GROUP: ${{ needs.load-config.outputs.azure_resource_group }}
        run: |
          set -euo pipefail
          # Package repo files needed by the API (api/, config/, data/, fabric/)
          zip -r api-deploy.zip api/ config/ data/ fabric/powerbi/ LICENSE README.md \
            -x '*.git*' 'data/employees/*'
          # Stop app to free Kudu, deploy, then start
          az webapp stop --resource-group "$RESOURCE_GROUP" --name "$API_APP_NAME"
          az webapp deploy \
            --resource-group "$RESOURCE_GROUP" \
            --name "$API_APP_NAME" \
            --src-path api-deploy.zip \
            --type zip \
            --async true
          az webapp start --resource-group "$RESOURCE_GROUP" --name "$API_APP_NAME"
          echo "API deployed to https://${API_APP_NAME}.azurewebsites.net"

  deploy-ui:
    if: >-
      github.event.inputs.apply == 'true' &&
      needs.check-auth.outputs.auth_mode != 'none'
    needs:
      - terraform-apply
      - load-config
      - check-auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Azure Login (OIDC)
        if: needs.check-auth.outputs.auth_mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || needs.load-config.outputs.azure_subscription_id }}
      - name: Azure Login (service principal JSON)
        if: needs.check-auth.outputs.auth_mode == 'sp'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build and package UI
        run: |
          set -euo pipefail
          UI_DIR="ui/ionic-angular"
          cd "$UI_DIR"
          npm ci --ignore-scripts || npm install --ignore-scripts
          # Build production bundle (falls back to packaging source if build fails)
          if npm run build 2>/dev/null; then
            cd www  # Ionic build output
          else
            echo "::warning::ionic build failed – packaging source files as fallback"
            cd src
          fi
          zip -r ../../ui-deploy.zip .
      - name: Copy data assets into UI package
        run: |
          set -euo pipefail
          # Add config and data files the UI reads at runtime
          mkdir -p _ui_assets/config _ui_assets/data _ui_assets/fabric/powerbi
          cp config/endpoints.json _ui_assets/config/
          cp data/employees.json data/digital_assets.json data/contributions.json \
             data/projects.json data/org_hierarchy.json data/emails.json \
             _ui_assets/data/
          cp fabric/powerbi/powerbi_reports.json _ui_assets/fabric/powerbi/
          cd _ui_assets && zip -r ../ui-deploy.zip . -g
      - name: Deploy UI to App Service
        env:
          UI_APP_NAME: ${{ needs.load-config.outputs.ui_app_name }}
          RESOURCE_GROUP: ${{ needs.load-config.outputs.azure_resource_group }}
        run: |
          set -euo pipefail
          az webapp stop --resource-group "$RESOURCE_GROUP" --name "$UI_APP_NAME"
          az webapp deploy \
            --resource-group "$RESOURCE_GROUP" \
            --name "$UI_APP_NAME" \
            --src-path ui-deploy.zip \
            --type zip \
            --async true
          az webapp start --resource-group "$RESOURCE_GROUP" --name "$UI_APP_NAME"
          echo "UI deployed to https://${UI_APP_NAME}.azurewebsites.net"

  deploy-fabric-components:
    if: >-
      github.event.inputs.apply == 'true' &&
      needs.check-auth.outputs.auth_mode != 'none'
    needs:
      - terraform-apply
      - load-config
      - check-auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        if: needs.check-auth.outputs.auth_mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || needs.load-config.outputs.azure_subscription_id }}
      - name: Azure Login (service principal JSON)
        if: needs.check-auth.outputs.auth_mode == 'sp'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Read Fabric workspace config
        id: fabric-config
        run: |
          set -euo pipefail
          ws_id=$(jq -r '.microsoftFabric.workspaceId' config/endpoints.json)
          lh_id=$(jq -r '.microsoftFabric.lakehouseId' config/endpoints.json)
          capacity_id=$(jq -r '.microsoftFabric.capacityId' config/endpoints.json)
          echo "workspace_id=$ws_id" >> "$GITHUB_OUTPUT"
          echo "lakehouse_id=$lh_id" >> "$GITHUB_OUTPUT"
          echo "capacity_id=$capacity_id" >> "$GITHUB_OUTPUT"
      - name: Resume Fabric capacity
        run: |
          set -euo pipefail
          CAPACITY_ARM_ID=$(jq -r '.fabric.capacityId' config/azure-hosting-resources.json)
          az rest --method POST \
            --url "https://management.azure.com${CAPACITY_ARM_ID}/resume?api-version=2023-11-01" \
            || echo "::warning::Capacity resume failed or already active"
          sleep 10
      - name: Create or verify Fabric workspace
        id: workspace
        env:
          FABRIC_API: "https://api.fabric.microsoft.com/v1"
          WS_ID: ${{ steps.fabric-config.outputs.workspace_id }}
        run: |
          set -euo pipefail
          RESOURCE="https://api.fabric.microsoft.com"
          # Check if workspace exists
          HTTP_CODE=$(az rest --method GET \
            --url "${FABRIC_API}/workspaces/${WS_ID}" \
            --resource "$RESOURCE" \
            --output none --query "id" 2>&1 && echo "200" || echo "404")
          if [[ "$HTTP_CODE" == "404" ]]; then
            echo "::warning::Workspace not found. Create it via Fabric portal or az rest."
          else
            echo "Workspace $WS_ID verified"
          fi
      - name: Create semantic model definition
        env:
          FABRIC_API: "https://api.fabric.microsoft.com/v1"
          WS_ID: ${{ steps.fabric-config.outputs.workspace_id }}
        run: |
          set -euo pipefail
          RESOURCE="https://api.fabric.microsoft.com"
          BODY=$(mktemp)
          cat > "$BODY" <<'JSON'
          {
            "displayName": "EmployeeKnowledgeModel",
            "description": "Semantic model for employee knowledge graph analytics"
          }
          JSON
          az rest --method POST \
            --url "${FABRIC_API}/workspaces/${WS_ID}/semanticModels" \
            --resource "$RESOURCE" \
            --body "@$BODY" \
            --headers "Content-Type=application/json" \
            -o json 2>&1 || echo "::warning::Semantic model creation skipped (may already exist)"
          rm -f "$BODY"
      - name: Create data pipeline
        env:
          FABRIC_API: "https://api.fabric.microsoft.com/v1"
          WS_ID: ${{ steps.fabric-config.outputs.workspace_id }}
        run: |
          set -euo pipefail
          RESOURCE="https://api.fabric.microsoft.com"
          BODY=$(mktemp)
          cat > "$BODY" <<'JSON'
          {
            "displayName": "EmployeeKnowledgePipeline",
            "description": "Ingestion pipeline: Blob Storage → Document Intelligence → OneLake → Semantic Model"
          }
          JSON
          az rest --method POST \
            --url "${FABRIC_API}/workspaces/${WS_ID}/dataPipelines" \
            --resource "$RESOURCE" \
            --body "@$BODY" \
            --headers "Content-Type=application/json" \
            -o json 2>&1 || echo "::warning::Pipeline creation skipped (may already exist)"
          rm -f "$BODY"
      - name: Upload data to blob storage for Fabric ingestion
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [[ -z "${STORAGE_ACCOUNT:-}" ]]; then
            STORAGE_ACCOUNT="stfabriciqdemodata01"
          fi
          for f in employees.json digital_assets.json contributions.json projects.json org_hierarchy.json emails.json; do
            az storage blob upload \
              --account-name "$STORAGE_ACCOUNT" \
              --container-name "employee-knowledge-raw" \
              --name "$f" \
              --file "data/$f" \
              --overwrite \
              --auth-mode login \
              --output none 2>/dev/null || echo "::warning::Failed to upload $f"
          done
          echo "Data files uploaded to employee-knowledge-raw container"
      - name: Deployment summary
        run: |
          echo "### Fabric Component Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workspace ID: \`${{ steps.fabric-config.outputs.workspace_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Lakehouse ID: \`${{ steps.fabric-config.outputs.lakehouse_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Semantic model, pipeline, and data upload jobs executed" >> "$GITHUB_STEP_SUMMARY"

  deployment-summary:
    if: always()
    needs:
      - load-config
      - check-auth
      - package-fabric-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Report deployment status
        env:
          AUTH_MODE: ${{ needs.check-auth.outputs.auth_mode }}
          APPLY: ${{ github.event.inputs.apply }}
          RESOURCE_GROUP: ${{ needs.load-config.outputs.azure_resource_group }}
          UI_APP_NAME: ${{ needs.load-config.outputs.ui_app_name }}
          API_APP_NAME: ${{ needs.load-config.outputs.api_app_name }}
        run: |
          echo "### Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$AUTH_MODE" == "none" ]]; then
            echo "⚠️ **Azure credentials not configured** — Terraform plan/apply and UI deployment were skipped." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "To enable deployment, add the following GitHub repository secrets:" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`AZURE_CLIENT_ID\` + \`AZURE_TENANT_ID\` + \`AZURE_SUBSCRIPTION_ID\` (OIDC — recommended)" >> "$GITHUB_STEP_SUMMARY"
            echo "- OR \`AZURE_CREDENTIALS\` (service principal JSON — fallback)" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`AZURE_STORAGE_ACCOUNT\` — required for blob/UI upload steps" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "See the **GitHub Secrets Setup** section in [README.md](README.md) for step-by-step instructions." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ **Azure credentials detected** (mode: \`$AUTH_MODE\`)" >> "$GITHUB_STEP_SUMMARY"
            if [[ "$APPLY" == "true" ]]; then
              echo "✅ Apply was requested — Terraform apply and UI deployment ran." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "ℹ️ Apply was not requested — only Terraform plan was produced." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fabric bundle packaged | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Azure auth mode | \`$AUTH_MODE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource group | \`$RESOURCE_GROUP\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| UI App Service | \`$UI_APP_NAME\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API App Service | \`$API_APP_NAME\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fabric components | semantic model, pipeline, data upload |" >> "$GITHUB_STEP_SUMMARY"
